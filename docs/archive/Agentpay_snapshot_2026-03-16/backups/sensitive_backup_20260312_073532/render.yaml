# Render deployment configuration for AgentPay backend
# https://render.com/docs/render-yaml
#
# ─── MIGRATION STATUS ────────────────────────────────────────────────────────
# Public HTTP API has been migrated to Cloudflare Workers (apps/api-edge/).
# Render now serves as:
#   1. Rollback target — if the Workers backend has a critical issue, revert
#      AGENTPAY_API_BASE_URL in Vercel to point here.
#   2. Background daemon host — the following features MUST remain on Render
#      until Phase 13 completes:
#        - Solana transaction listener (src/services/solana-listener.ts)
#        - Reconciliation daemon / liquidity cron (if present)
#        - Any process.setInterval / setTimeout-based polling loops
#   3. POST /api/merchants/payments/:id/verify — full Solana verification
#      (blocked on Workers by lack of @solana/web3.js support)
#   4. PIN-based agent auth (bcrypt — Node.js native C++ module)
#
# DO NOT DELETE this file or the src/ directory until Phase 13 is complete
# and all deferred routes/daemons have been migrated or retired.
#
# Render should be removed from the public request path by updating
# AGENTPAY_API_BASE_URL in Vercel to the Workers URL (see apps/api-edge/CUTOVER.md).
# Render will continue to run for daemon tasks only.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: agentpay-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install --production=false && npx prisma generate && npm run build
    # Run DB migrations before starting the server so every deploy is schema-up-to-date.
    startCommand: node scripts/migrate.js && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TEST_MODE
        value: false
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: warn
      # Set the following in the Render dashboard (do NOT commit secrets):
      - key: DATABASE_URL
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.mainnet-beta.solana.com
      - key: CONFIRMATION_DEPTH
        value: "10"
      # Shared HMAC-SHA256 secret for outgoing webhook signatures. [REQUIRED]
      - key: WEBHOOK_SECRET
        sync: false
      # HMAC signing secret for AP2 payment receipts. [REQUIRED]
      - key: AGENTPAY_SIGNING_SECRET
        sync: false
      # HMAC signing secret for verification certificates. [REQUIRED]
      - key: VERIFICATION_SECRET
        sync: false
      # Bearer token for admin API endpoints. [REQUIRED]
      - key: ADMIN_SECRET_KEY
        sync: false
      # Stripe live secret key (set only if Stripe integration is enabled).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false          # e.g. https://agentpay.vercel.app
      # Public base URL of this service — used by protocol handlers and Stripe callbacks.
      - key: API_BASE_URL
        sync: false          # e.g. https://agentpay.onrender.com
      - key: AGENTPAY_API_BASE_URL
        value: ""
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
