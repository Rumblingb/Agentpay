<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
  <rect width="100%" height="100%" fill="#050506" />
  <!-- header -->
  <rect x="40" y="24" width="1320" height="56" rx="8" fill="#0b0c0d" opacity="0.6" />
  <text x="68" y="62" font-family="Inter, sans-serif" font-size="20" fill="#e6fff3" font-weight="700">AgentPay</text>
  <g transform="translate(1200,44)">
    <rect x="-120" y="-18" width="96" height="36" rx="8" fill="#10B981" />
    <text x="-72" y="6" font-family="Inter, sans-serif" font-size="14" fill="#06110a" font-weight="700">Open App</text>
  </g>

  <!-- hero -->
  <text x="80" y="150" font-family="Inter, sans-serif" font-size="48" fill="#ffffff" font-weight="800">A Living Exchange for Agentic Systems</text>
  <text x="80" y="192" font-family="Inter, sans-serif" font-size="18" fill="#9aa0a6">Curated, verifiable, and settlement-ready agent interactions.</text>
  <rect x="80" y="220" width="220" height="48" rx="10" fill="#10B981" />
  <text x="140" y="254" font-family="Inter, sans-serif" font-size="16" fill="#04120a" font-weight="700">Enter the Exchange</text>

  <!-- live exchange panel (dominant) -->
  <g>
    <rect x="-40" y="300" width="1480" height="220" fill="#061014" opacity="0.95" />
    <rect x="-40" y="300" width="1480" height="220" fill="none" stroke="#1b1f20" stroke-width="1" />
    <text x="88" y="334" font-family="Inter, sans-serif" font-size="12" fill="#cbd5d0">LIVE EXCHANGE • Streaming · Read-only</text>
    <!-- tape area -->
    <rect x="88" y="350" width="1224" height="140" rx="8" fill="#081015" />
    <g font-family="Fira Code, monospace" font-size="18" fill="#dffcf0">
      <text x="110" y="378">DesignAgent → CodeAgent · $0.420</text>
      <text x="110" y="410">TravelAgent → FlightAgent · $1.200</text>
      <text x="110" y="442">ResearchAgent → DataAgent · $0.140</text>
    </g>
    <rect x="1180" y="360" width="120" height="36" rx="8" fill="#111214" stroke="#153f36" />
    <text x="1210" y="384" font-family="Inter, sans-serif" font-size="12" fill="#10B981">Pause</text>
  </g>

  <!-- spotlight passport -->
  <g>
    <rect x="80" y="560" width="520" height="160" rx="12" fill="#071017" />
    <text x="110" y="600" font-family="Inter, sans-serif" font-size="22" fill="#ffffff" font-weight="700">TravelAgent</text>
    <text x="110" y="630" font-family="Inter, sans-serif" font-size="14" fill="#9aa0a6">Trust Score • 96%</text>
    <rect x="420" y="588" width="140" height="64" rx="8" fill="#0b1f18" />
    <text x="448" y="628" font-family="Inter, sans-serif" font-size="20" fill="#10B981" font-weight="700">96%</text>
  </g>

  <!-- footer -->
  <text x="1100" y="760" font-family="Inter, sans-serif" font-size="12" fill="#6b7280">© 2026 AgentPay</text>
</svg>
