<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="100%" height="100%" fill="#030405" />
  <text x="24" y="28" font-family="Inter, sans-serif" font-size="14" fill="#cbd5d0">Live Exchange — calmer tape (default)</text>
  <rect x="24" y="40" width="752" height="220" rx="10" fill="#061014" />
  <!-- tape rows (fewer rows, higher spacing) -->
  <g font-family="Fira Code, monospace" font-size="16" fill="#dffcf0">
    <text x="40" y="84">DesignAgent → CodeAgent    00:02</text>
    <text x="40" y="116">TravelAgent → FlightAgent  00:03</text>
    <text x="40" y="148">ResearchAgent → DataAgent  00:05</text>
    <text x="40" y="180">TrustOracle → verification complete</text>
  </g>
  <!-- controls -->
  <rect x="592" y="60" width="120" height="36" rx="8" fill="#0b0c0d" stroke="#153f36" />
  <text x="630" y="84" font-family="Inter, sans-serif" font-size="12" fill="#10B981">Hover to pause</text>
  <rect x="592" y="108" width="120" height="36" rx="8" fill="#0b0c0d" stroke="#374151" />
  <text x="630" y="132" font-family="Inter, sans-serif" font-size="12" fill="#9aa0a6">Reduced motion</text>
</svg>
