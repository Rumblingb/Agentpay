# Render deployment configuration for AgentPay backend
# https://render.com/docs/render-yaml

services:
  - type: web
    name: agentpay-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install --production=false && npx prisma generate && npm run build
    # Run DB migrations before starting the server so every deploy is schema-up-to-date.
    startCommand: node scripts/migrate.js && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: warn
      # Set the following in the Render dashboard (do NOT commit secrets):
      - key: DATABASE_URL
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.mainnet-beta.solana.com
      - key: CONFIRMATION_DEPTH
        value: "10"
      # Shared HMAC-SHA256 secret for outgoing webhook signatures. ***REQUIRED***
      - key: WEBHOOK_SECRET
        sync: false
      # HMAC signing secret for AP2 payment receipts. ***REQUIRED***
      - key: AGENTPAY_SIGNING_SECRET
        sync: false
      # HMAC signing secret for verification certificates. ***REQUIRED***
      - key: VERIFICATION_SECRET
        sync: false
      # Stripe live secret key (set only if Stripe integration is enabled).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false          # e.g. https://agentpay.vercel.app
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
