<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Deep steel background -->
    <radialGradient id="bg" cx="42%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="45%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </radialGradient>

    <!-- Glass oval body -->
    <linearGradient id="ovalFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#5a6a80" stop-opacity="0.72"/>
      <stop offset="40%" stop-color="#3d4f62" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#2a3a4c" stop-opacity="0.82"/>
    </linearGradient>

    <!-- Glass sheen top-left highlight -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="60%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Arrow gradient -->
    <linearGradient id="arrowFill" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e2f0ff"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>

    <!-- Soft glow behind oval -->
    <filter id="ovalGlow" x="-20%" y="-15%" width="140%" height="130%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow drop shadow -->
    <filter id="arrowShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#c8e4ff" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Outer glow ring around oval -->
  <ellipse cx="512" cy="510" rx="298" ry="358"
    fill="none" stroke="rgba(180,210,240,0.18)" stroke-width="28"
    filter="url(#ovalGlow)"/>

  <!-- Glass oval body -->
  <ellipse cx="512" cy="510" rx="272" ry="330"
    fill="url(#ovalFill)"
    stroke="rgba(200,225,255,0.55)" stroke-width="3"/>

  <!-- Glass sheen overlay -->
  <ellipse cx="512" cy="510" rx="272" ry="330"
    fill="url(#sheen)"/>

  <!-- Inner rim highlight top -->
  <ellipse cx="505" cy="510" rx="255" ry="313"
    fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Navigation arrow — same proportions as AceMark component, rotated 12deg -->
  <g transform="translate(512,510) rotate(12)" filter="url(#arrowShadow)">
    <!-- Right arm — tall, slightly right-leaning -->
    <rect x="28" y="-118" width="52" height="196"
      rx="26"
      fill="url(#arrowFill)"
      transform="rotate(2 54 -20)"/>
    <!-- Left arm — shorter, left side -->
    <rect x="-80" y="12" width="40" height="112"
      rx="20"
      fill="url(#arrowFill)"
      opacity="0.88"
      transform="rotate(-2 -60 68)"/>
    <!-- Foot bar -->
    <rect x="-68" y="110" width="88" height="28"
      rx="14"
      fill="url(#arrowFill)"
      opacity="0.82"/>
    <!-- Inner notch / shadow between arms -->
    <rect x="-4" y="18" width="28" height="72"
      rx="14"
      fill="#2a3a4e"
      opacity="0.72"
      transform="rotate(4 10 54)"/>
  </g>
</svg>
