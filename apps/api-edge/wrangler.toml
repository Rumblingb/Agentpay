name = "agentpay-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Production environment (default) ─────────────────────────────────────────
[vars]
# Comma-separated list of allowed CORS origins.
# Add new origins here (no trailing slashes).  Vercel preview URLs
# (https://<agentpay|apay>-*.vercel.app) are allowed automatically by the
# cors middleware and do not need to be listed here.
CORS_ORIGIN = "https://apay-delta.vercel.app,https://agentpay.so,https://app.agentpay.so"
API_BASE_URL = "https://api.agentpay.so"
FRONTEND_URL = "https://apay-delta.vercel.app"
NODE_ENV = "production"

# Custom domain — api.agentpay.so
[[routes]]
pattern = "api.agentpay.so"
custom_domain = true

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "be606bac9fde4493b21fff2e085eb82c"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "SOLANA_LISTENER_DO"
class_name = "SolanaListenerDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SolanaListenerDO"]

[dev]
port = 8787
local_protocol = "http"

[triggers]
crons = [
  "*/5 * * * *",
  "*/15 * * * *",
]

# ── Staging environment ───────────────────────────────────────────────────────
# Deploy with: npx wrangler deploy --env staging
# Set secrets: npx wrangler secret put WEBHOOK_SECRET --env staging
#
# Staging uses a separate Worker name (agentpay-api-staging) and separate
# Cloudflare secrets so production secrets are never exposed in staging.
# Point STAGING_DATABASE_URL at a separate Supabase project or schema.
#
# Required secrets for staging (set via wrangler secret put --env staging):
#   DATABASE_URL, WEBHOOK_SECRET, AGENTPAY_SIGNING_SECRET, VERIFICATION_SECRET
#   ADMIN_SECRET_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
[env.staging]
name = "agentpay-api-staging"

[env.staging.vars]
CORS_ORIGIN = "http://localhost:3000,https://apay-staging.vercel.app"
API_BASE_URL = "https://agentpay-api-staging.apaybeta.workers.dev"
FRONTEND_URL = "https://apay-staging.vercel.app"
NODE_ENV = "staging"
# AGENTPAY_TEST_MODE = "true"   # Uncomment to enable test-key bypass in staging

[env.staging.triggers]
crons = [
  "*/15 * * * *",
]

# Note: Create a staging Hyperdrive config with:
#   npx wrangler hyperdrive create agentpay-staging --connection-string="<staging-db-url>"
# Then add:
#   [[env.staging.hyperdrive]]
#   binding = "HYPERDRIVE"
#   id = "<staging-hyperdrive-id>"
#
# Until the Hyperdrive config exists, staging can fall back to DATABASE_URL
# by removing the [[hyperdrive]] binding from the staging env section.