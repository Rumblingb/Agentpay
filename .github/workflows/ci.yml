name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  repo-integrity:
    name: Repo Integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agentpay_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/agentpay_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run release smoke tests
        run: npm run test:smoke

  workers:
    name: Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Typecheck Workers API
        run: npm run typecheck --workspace @agentpay/api-edge

      - name: Run Workers critical tests
        run: npm run test:workers-critical

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dashboard
    env:
      AGENTPAY_API_BASE_URL: http://localhost:8787
      DASHBOARD_SESSION_SECRET: ci-dashboard-session-secret-32-characters-minimum
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build
