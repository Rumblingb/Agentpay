name: Secret scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for high-risk secrets
        run: |
          set -euo pipefail
          echo "Looking for obvious secrets patterns..."
          # Patterns: Stripe keys, webhook secrets, direct DB URLs containing password
          if git grep -nE "sk_live_|sk_test_|mk_1|whsec_|postgresql://postgres:|STRIPE_SECRET_KEY=|STRIPE_WEBHOOK_SECRET=" -- ':!node_modules' ':!dist' ':!docs/archive' ; then
            echo "Potential secret found in repository. Commit will fail. Review and remove secrets from tracked files."
            exit 1
          else
            echo "No obvious secrets found"
          fi
