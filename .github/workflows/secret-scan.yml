name: Secret scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for high-risk secrets
        run: |
          set -euo pipefail
          echo "Looking for obvious secrets patterns..."
          # Scan code and config paths only. Docs, tests, and example templates
          # intentionally contain placeholder values that should not fail pushes.
          if git grep -nI -E "(sk_live_[A-Za-z0-9]{16,}|sk_test_[A-Za-z0-9]{16,}|mk_1[A-Za-z0-9]{16,}|whsec_[A-Za-z0-9]{16,}|STRIPE_SECRET_KEY=['\"]?(sk_live_[A-Za-z0-9]{16,}|sk_test_[A-Za-z0-9]{16,})|STRIPE_WEBHOOK_SECRET=['\"]?whsec_[A-Za-z0-9]{16,})" -- . \
            ':(exclude)node_modules' \
            ':(exclude)dist' \
            ':(exclude)docs/**' \
            ':(exclude)examples/**' \
            ':(exclude)prototypes/**' \
            ':(exclude)tests/**' \
            ':(exclude)**/*.md' \
            ':(exclude).env.example' \
            ':(exclude).env.production.example' \
            ':(exclude)apps/api-edge/.dev.vars.example' \
            ':(exclude).github/workflows/ci.yml' \
            ':(exclude).github/workflows/secret-scan.yml'; then
            echo "Potential secret found in repository. Commit will fail. Review and remove secrets from tracked files."
            exit 1
          else
            echo "No obvious secrets found"
          fi
