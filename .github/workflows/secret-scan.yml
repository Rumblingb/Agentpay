name: Secret scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for high-risk secrets
        run: |
          set -euo pipefail
          echo "Looking for obvious secrets patterns..."

          # Patterns: real-looking Stripe keys, webhook secrets, marketplace keys,
          # and direct DB URLs containing passwords.
          SECRET_PATTERNS='sk_(live|test)_[A-Za-z0-9]{24,}|mk_1[A-Za-z0-9]{20,}|whsec_[A-Za-z0-9]{24,}|STRIPE_SECRET_KEY=sk_(live|test)_[A-Za-z0-9]{24,}|STRIPE_WEBHOOK_SECRET=whsec_[A-Za-z0-9]{24,}|postgresql://[^[:space:]"'"'"']+:[^[:space:]"'"'"']+@[^[:space:]"'"'"']+'

          matches="$(
            git grep -nE "$SECRET_PATTERNS" -- \
              ':!node_modules' \
              ':!dist' \
              ':!docs' \
              ':!examples' \
              ':!tests' \
              ':!apps/docs' \
              ':!sdk/examples' \
              ':!**/*.test.ts' \
              ':!**/*.test.tsx' \
              ':!.env.example' \
              ':!.env.production.example' \
              ':!**/*.example' \
              ':!.github/workflows/secret-scan.yml' || true
          )"

          matches="$(printf '%s\n' "$matches" | grep -vE 'postgresql://postgres:postgres@localhost(:[0-9]+)?/' || true)"

          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            echo "Potential secret found in repository. Commit will fail. Review and remove secrets from tracked files."
            exit 1
          else
            echo "No obvious secrets found"
          fi
