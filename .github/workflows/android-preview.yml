name: Android Preview APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies (root workspace)
        run: npm install --ignore-scripts

      - name: Remove stripe native module (incompatible with RN 0.76)
        run: rm -rf node_modules/@stripe/stripe-react-native

      - name: Expo prebuild
        working-directory: apps/meridian
        env:
          EXPO_PUBLIC_API_URL: https://api.agentpay.so
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK (signed with debug keystore for sideloading)
        working-directory: apps/meridian/android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bro-android-${{ github.run_number }}
          path: apps/meridian/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
